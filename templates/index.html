<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 在线练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e4;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
            cursor: pointer;
        }

        .logo span {
            color: #64B5F6;
        }

        .header-nav {
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #e4e4e4;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-btn.active {
            background: rgba(76, 175, 80, 0.3);
            border-color: #4CAF50;
        }

        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* 左侧题目列表 */
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: bold;
        }

        /* 难度筛选 */
        .difficulty-filter {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .difficulty-filter label {
            font-size: 13px;
            opacity: 0.8;
            display: block;
            margin-bottom: 8px;
        }

        .difficulty-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .diff-btn {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        .diff-btn.all {
            background: rgba(255, 255, 255, 0.1);
            color: #e4e4e4;
        }

        .diff-btn.easy {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .diff-btn.medium {
            background: rgba(255, 152, 0, 0.2);
            color: #FF9800;
        }

        .diff-btn.hard {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
        }

        .diff-btn.extreme {
            background: rgba(156, 39, 176, 0.2);
            color: #9C27B0;
        }

        .diff-btn:hover, .diff-btn.active {
            border-color: currentColor;
            transform: scale(1.05);
        }

        .problem-list-container {
            flex: 1;
            overflow-y: auto;
        }

        .problem-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .problem-item:hover {
            background: rgba(76, 175, 80, 0.1);
        }

        .problem-item.active {
            background: rgba(76, 175, 80, 0.2);
            border-left: 3px solid #4CAF50;
        }

        .problem-title {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .problem-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .tag {
            font-size: 11px;
            padding: 2px 6px;
            background: rgba(100, 181, 246, 0.2);
            color: #64B5F6;
            border-radius: 3px;
        }

        .problem-difficulty {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }

        .difficulty-简单 { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .difficulty-中等 { background: rgba(255, 152, 0, 0.2); color: #FF9800; }
        .difficulty-困难 { background: rgba(244, 67, 54, 0.2); color: #F44336; }
        .difficulty-非常困难 { background: rgba(156, 39, 176, 0.2); color: #9C27B0; }

        /* 中间题目描述 - 可折叠 */
        .problem-panel-wrapper {
            position: relative;
            transition: all 0.3s ease;
            display: flex;
        }

        .problem-panel {
            width: 400px;
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            height: 100%;
            transition: all 0.3s ease;
        }

        .problem-panel.collapsed {
            width: 0;
            min-width: 0;
            overflow: hidden;
            border: none;
        }

        .collapse-btn {
            width: 20px;
            height: 50px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.5) 0%, rgba(76, 175, 80, 0.2) 100%);
            border: 1px solid rgba(76, 175, 80, 0.5);
            border-radius: 0 6px 6px 0;
            color: white;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.3s;
            box-shadow: 2px 0 8px rgba(76, 175, 80, 0.3);
            flex-shrink: 0;
        }

        .collapse-btn:hover {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.7) 0%, rgba(76, 175, 80, 0.4) 100%);
        }

        .problem-content {
            padding: 20px;
        }

        .problem-header {
            margin-bottom: 20px;
        }

        .problem-header h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .problem-description {
            line-height: 1.8;
            font-size: 14px;
        }

        .problem-description pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .problem-description code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Consolas', monospace;
        }

        /* 右侧代码编辑器 */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
        }

        .editor-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-run { background: #4CAF50; color: white; }
        .btn-run:hover { background: #45a049; }
        .btn-submit { background: #2196F3; color: white; }
        .btn-submit:hover { background: #1976D2; }
        .btn-help { background: #FF9800; color: white; }
        .btn-help:hover { background: #F57C00; }
        .btn-analyze { background: #9C27B0; color: white; }
        .btn-analyze:hover { background: #7B1FA2; }

        .editor-wrapper {
            flex: 1;
            position: relative;
            min-height: 300px;
        }

        #code-editor {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Monaco', 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border: none;
            outline: none;
            resize: none;
            line-height: 1.6;
            min-height: 100%;
        }

        /* 输出区域 */
        .output-panel {
            height: 250px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .output-header {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .output-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .output-content .success { color: #4CAF50; }
        .output-content .error { color: #F44336; }
        .output-content .info { color: #64B5F6; }
        .output-content .warning { color: #FF9800; }

        /* 测试结果 */
        .test-result {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
        }

        .test-result.passed { border-left: 3px solid #4CAF50; }
        .test-result.failed { border-left: 3px solid #F44336; }

        .test-result-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .test-result-detail {
            font-size: 12px;
            opacity: 0.8;
        }

        /* 代码分析 */
        .analysis-panel {
            background: rgba(156, 39, 176, 0.1);
            border: 1px solid rgba(156, 39, 176, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }

        .analysis-score {
            font-size: 24px;
            font-weight: bold;
            color: #9C27B0;
            margin-bottom: 10px;
        }

        .analysis-item {
            margin: 8px 0;
            font-size: 13px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.3s ease; }

        /* ========== 移动端适配 ========== */
        @media screen and (max-width: 768px) {
            .header {
                padding: 10px 15px;
                flex-wrap: wrap;
            }
            
            .logo {
                font-size: 18px;
            }
            
            .header-nav {
                width: 100%;
                justify-content: center;
                margin-top: 10px;
                gap: 10px;
            }
            
            .nav-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
            
            .container {
                flex-direction: column;
                height: auto;
                min-height: calc(100vh - 100px);
            }
            
            /* 移动端侧边栏变成顶部标题 */
            .sidebar {
                width: 100%;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                flex-shrink: 0;
            }
            
            /* 问题面板和编辑器 */
            .problem-panel-wrapper {
                width: 100%;
                max-height: 35vh;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                overflow-y: auto;
                display: block;
                flex-shrink: 0;
            }
            
            .problem-panel {
                width: 100%;
                height: auto;
                max-height: 100%;
                border-right: none;
            }
            
            /* 移动端折叠按钮 - 改成上下折叠 */
            .collapse-btn {
                display: block !important;
                position: absolute;
                bottom: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 60px;
                height: 24px;
                border-radius: 12px 12px 0 0;
                background: rgba(255, 255, 255, 0.1);
                color: white;
                border: none;
                cursor: pointer;
                font-size: 12px;
                z-index: 10;
            }
            
            .problem-panel-wrapper.collapsed {
                max-height: 40px;
                min-height: 40px;
            }
            
            .problem-panel-wrapper.collapsed .problem-panel {
                display: none;
            }
            
            .problem-panel-wrapper.collapsed .collapse-btn {
                bottom: auto;
                top: 50%;
                transform: translate(-50%, -50%);
            }
            
            .editor-panel {
                width: 100%;
                min-height: 400px;
                flex: 1;
                flex-shrink: 0;
            }
            
            .sidebar-header {
                padding: 12px 15px;
                font-size: 14px;
            }
            
            .difficulty-filter {
                padding: 10px 15px;
            }
            
            .difficulty-filter label {
                font-size: 12px;
            }
            
            .diff-btn {
                padding: 4px 8px;
                font-size: 11px;
            }
            
            .problem-list {
                flex: 1;
                overflow-y: auto;
            }
            
            .problem-item {
                padding: 10px 15px;
            }
            
            .problem-title {
                font-size: 13px;
            }
            
            .problem-header h2 {
                font-size: 16px;
            }
            
            .problem-meta {
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .tag {
                font-size: 11px;
                padding: 2px 8px;
            }
            
            .problem-description {
                font-size: 13px;
                padding: 12px;
            }
            
            /* 编辑器区域 */
            .editor-section {
                padding: 10px;
            }
            
            .editor-header {
                font-size: 13px;
                padding: 8px 10px;
                flex-wrap: wrap;
            }
            
            .editor-buttons {
                gap: 6px;
            }
            
            .btn {
                padding: 6px 10px;
                font-size: 11px;
            }
            
            .code-editor {
                font-size: 12px;
                min-height: 250px;
                padding: 10px;
            }
            
            .editor-wrapper {
                min-height: 250px;
                flex: 1;
            }
            
            .output-panel {
                height: 150px;
            }
            
            /* 按钮组 */
            .btn-group {
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .btn {
                padding: 8px 16px;
                font-size: 12px;
            }
            
            /* 输出区域 */
            .output {
                padding: 10px;
            }
            
            .output-header {
                font-size: 13px;
                padding: 8px 10px;
            }
            
            .output-content {
                font-size: 12px;
                padding: 10px;
            }
            
            /* 结果卡片 */
            .result-card {
                margin: 8px 0;
                padding: 10px;
            }
            
            .result-title {
                font-size: 14px;
            }
            
            /* 分析区 */
            .analysis-section {
                padding: 10px;
            }
            
            .analysis-score {
                font-size: 18px;
            }
            
            .analysis-item {
                font-size: 12px;
            }
        }
        
        /* 超小屏幕 */
        @media screen and (max-width: 480px) {
            .header-nav {
                gap: 6px;
            }
            
            .nav-btn {
                padding: 5px 10px;
                font-size: 11px;
            }
            
            .sidebar {
                max-height: 40vh;
            }
            
            .problem-header h2 {
                font-size: 14px;
            }
            
            .code-editor {
                min-height: 180px;
            }
            
            .btn {
                padding: 6px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='/'">🐍 Python <span>在线练习</span></div>
        <div class="header-nav">
            <a href="/" class="nav-btn active">📝 算法练习</a>
            <a href="/free" class="nav-btn">🆓 自由编辑</a>
            <a href="/stats" class="nav-btn">📊 访问统计</a>
        </div>
    </div>

    <div class="container">
        <!-- 左侧题目列表 -->
        <div class="sidebar">
            <div class="sidebar-header">📚 题目列表</div>
            <div class="difficulty-filter">
                <label>难度筛选</label>
                <div class="difficulty-btns">
                    <span class="diff-btn all active" onclick="filterDifficulty('all')">全部</span>
                    <span class="diff-btn easy" onclick="filterDifficulty('简单')">简单</span>
                    <span class="diff-btn medium" onclick="filterDifficulty('中等')">中等</span>
                    <span class="diff-btn hard" onclick="filterDifficulty('困难')">困难</span>
                    <span class="diff-btn extreme" onclick="filterDifficulty('非常困难')">非常困难</span>
                </div>
            </div>
            <div class="problem-list-container" id="problem-list"></div>
        </div>

        <!-- 中间题目描述 - 可折叠 -->
        <div class="problem-panel-wrapper" id="problem-panel-wrapper">
            <div class="problem-panel" id="problem-panel">
                <div class="problem-content" id="problem-content">
                    <div style="text-align: center; padding: 50px; opacity: 0.5;">
                        请从左侧选择一道题目开始练习
                    </div>
                </div>
            </div>
            <button class="collapse-btn" onclick="toggleProblemPanel()">◀</button>
        </div>

        <!-- 右侧代码编辑器 -->
        <div class="editor-panel">
            <div class="editor-header">
                <div style="font-size: 13px; opacity: 0.7;">📝 代码编辑器</div>
                <div class="editor-buttons">
                    <button class="btn btn-help" onclick="showHints()">💡 提示</button>
                    <button class="btn btn-help" onclick="showHelp()">📖 答案</button>
                    <button class="btn btn-analyze" onclick="analyzeCode()">🔍 评价</button>
                    <button class="btn btn-run" onclick="runCode()">▶ 运行</button>
                    <button class="btn btn-submit" onclick="submitCode()">✓ 提交</button>
                </div>
            </div>
            <div class="editor-wrapper">
                <textarea id="code-editor" placeholder="# 在这里编写你的代码..." spellcheck="false"></textarea>
            </div>
            <div class="output-panel">
                <div class="output-header">
                    <span>输出结果</span>
                    <span id="status-indicator"></span>
                </div>
                <div class="output-content" id="output-content">
                    <div style="opacity: 0.5; text-align: center; padding: 20px;">
                        运行代码后结果将显示在这里
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentProblem = null;
        let currentDifficulty = 'all';

        // 加载题目列表
        async function loadProblems(difficulty = 'all') {
            const url = `/api/problems?difficulty=${difficulty}`;
            const response = await fetch(url);
            const problems = await response.json();
            
            const listHtml = problems.map(p => {
                const tagsHtml = (p.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
                return `
                    <div class="problem-item" onclick="loadProblem('${p.id}')" id="problem-${p.id}">
                        <div class="problem-title">${p.id}. ${p.title}</div>
                        <span class="problem-difficulty difficulty-${p.difficulty}">${p.difficulty}</span>
                        <div class="problem-tags">${tagsHtml}</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('problem-list').innerHTML = listHtml;
        }

        // 难度筛选
        function filterDifficulty(difficulty) {
            currentDifficulty = difficulty;
            
            // 更新按钮状态
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            loadProblems(difficulty);
        }

        // 折叠题目面板
        function toggleProblemPanel() {
            const wrapper = document.getElementById('problem-panel-wrapper');
            const panel = document.getElementById('problem-panel');
            const btn = wrapper.querySelector('.collapse-btn');
            wrapper.classList.toggle('collapsed');
            panel.classList.toggle('collapsed');
            
            // 移动端用 ▲/▼，PC端用 ▶/◀
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                btn.textContent = wrapper.classList.contains('collapsed') ? '▼ 题目' : '▲ 收起';
            } else {
                btn.textContent = wrapper.classList.contains('collapsed') ? '▶' : '◀';
            }
        }

        // 加载题目详情
        async function loadProblem(id) {
            const response = await fetch(`/api/problem/${id}`);
            const problem = await response.json();
            
            currentProblem = problem;
            
            // 更新题目列表选中状态
            document.querySelectorAll('.problem-item').forEach(item => {
                item.classList.remove('active');
            });
            document.getElementById(`problem-${id}`).classList.add('active');
            
            // 确保题目面板展开
            const wrapper = document.getElementById('problem-panel-wrapper');
            const panel = document.getElementById('problem-panel');
            wrapper.classList.remove('collapsed');
            panel.classList.remove('collapsed');
            
            // 移动端用 ▲/▼，PC端用 ▶/◀
            const isMobile = window.innerWidth <= 768;
            wrapper.querySelector('.collapse-btn').textContent = isMobile ? '▲ 收起' : '◀';
            
            // 更新题目描述
            const descHtml = problem.description
                .replace(/\n/g, '<br>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            document.getElementById('problem-content').innerHTML = `
                <div class="problem-header fade-in">
                    <h2>${problem.id}. ${problem.title}</h2>
                    <span class="problem-difficulty difficulty-${problem.difficulty}">${problem.difficulty}</span>
                </div>
                <div class="problem-description fade-in">${descHtml}</div>
            `;
            
            // 更新代码编辑器
            document.getElementById('code-editor').value = problem.template;
            
            // 清空输出
            clearOutput();
            
            // 移动端自动滚动到编辑器区域
            if (window.innerWidth <= 768) {
                setTimeout(() => {
                    document.querySelector('.editor-panel').scrollIntoView({ 
                        behavior: 'smooth',
                        block: 'start'
                    });
                }, 100);
            }
        }

        // 清空输出
        function clearOutput() {
            document.getElementById('output-content').innerHTML = `
                <div style="opacity: 0.5; text-align: center; padding: 20px;">
                    运行代码后结果将显示在这里
                </div>
            `;
            document.getElementById('status-indicator').textContent = '';
        }

        // 运行代码
        async function runCode() {
            const code = document.getElementById('code-editor').value;
            setOutput('<div class="info">⏳ 运行中...</div>');
            
            const response = await fetch('/api/run', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code})
            });
            
            const result = await response.json();
            
            if (result.success) {
                setOutput(`<div class="success">✓ 运行成功</div><pre>${result.output || '(无输出)'}</pre>`);
            } else {
                setOutput(`<div class="error">✗ 运行失败</div><pre>${result.output}</pre>`);
            }
        }

        // 提交代码
        async function submitCode() {
            if (!currentProblem) {
                alert('请先选择一道题目');
                return;
            }
            
            const code = document.getElementById('code-editor').value;
            setOutput('<div class="info">⏳ 测试中...</div>');
            
            const response = await fetch(`/api/submit/${currentProblem.id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code})
            });
            
            const result = await response.json();
            
            let html = '';
            
            if (result.all_passed) {
                html += `<div class="success" style="font-size: 18px; margin-bottom: 15px;">🎉 恭喜！所有测试用例通过！</div>`;
                document.getElementById('status-indicator').innerHTML = '<span style="color: #4CAF50;">✓ 全部通过</span>';
            } else {
                html += `<div class="error" style="font-size: 18px; margin-bottom: 15px;">❌ 有测试用例未通过，继续加油！</div>`;
                document.getElementById('status-indicator').innerHTML = '<span style="color: #F44336;">✗ 未通过</span>';
            }
            
            result.results.forEach((r, i) => {
                const statusClass = r.passed ? 'passed' : 'failed';
                const statusIcon = r.passed ? '✓' : '✗';
                const statusColor = r.passed ? 'success' : 'error';
                
                html += `
                    <div class="test-result ${statusClass}">
                        <div class="test-result-title">
                            <span class="${statusColor}">${statusIcon}</span> 测试用例 ${i + 1}
                        </div>
                        <div class="test-result-detail">
                            输入: ${r.input}<br>
                            期望: ${r.expected}<br>
                            实际: ${r.actual}
                            ${r.error ? '<br><span class="error">执行出错</span>' : ''}
                        </div>
                    </div>
                `;
            });
            
            setOutput(html);
        }

        // 分析代码
        async function analyzeCode() {
            if (!currentProblem) {
                alert('请先选择一道题目');
                return;
            }
            
            const code = document.getElementById('code-editor').value;
            
            const response = await fetch(`/api/analyze/${currentProblem.id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code})
            });
            
            const analysis = await response.json();
            
            let html = `
                <div class="analysis-panel fade-in">
                    <div class="analysis-score">📊 代码评分: ${analysis.score}/100</div>
                    <div class="analysis-item"><strong>评价：</strong></div>
            `;
            
            analysis.comments.forEach(comment => {
                html += `<div class="analysis-item">${comment}</div>`;
            });
            
            if (analysis.suggestions.length > 0) {
                html += `<div class="analysis-item" style="margin-top: 10px;"><strong>建议：</strong></div>`;
                analysis.suggestions.forEach(s => {
                    html += `<div class="analysis-item warning">${s}</div>`;
                });
            }
            
            html += '</div>';
            
            // 添加到输出区域
            const outputContent = document.getElementById('output-content');
            outputContent.innerHTML = html + outputContent.innerHTML;
        }

        // 显示提示
        async function showHints() {
            if (!currentProblem) {
                alert('请先选择一道题目');
                return;
            }
            
            const response = await fetch(`/api/hints/${currentProblem.id}`);
            const data = await response.json();
            
            if (data.hints && data.hints.length > 0) {
                let html = '<div class="info" style="margin-bottom: 10px;">💡 <strong>提示：</strong></div>';
                data.hints.forEach((hint, i) => {
                    html += `<div class="analysis-item">${i + 1}. ${hint}</div>`;
                });
                setOutput(html);
            } else {
                setOutput('<div class="warning">暂无提示</div>');
            }
        }

        // 显示答案
        async function showHelp() {
            if (!currentProblem) {
                alert('请先选择一道题目');
                return;
            }
            
            if (!confirm('确定要查看答案吗？建议先自己思考哦！')) {
                return;
            }
            
            const response = await fetch(`/api/solution/${currentProblem.id}`);
            const result = await response.json();
            
            document.getElementById('code-editor').value = result.solution;
            setOutput('<div class="info">💡 已加载参考答案，可以运行查看效果</div>');
        }

        function setOutput(html) {
            document.getElementById('output-content').innerHTML = html;
        }

        // 页面加载时初始化
        loadProblems();
        
        // 支持 Tab 键缩进
        document.getElementById('code-editor').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });
    </script>
</body>
</html>
