<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 访问统计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .login-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .login-desc {
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e4e4e4;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #4CAF50;
            background: rgba(0, 0, 0, 0.4);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #F44336;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .back-link {
            margin-top: 20px;
            display: block;
            color: #64B5F6;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-icon">🔐</div>
        <h1 class="login-title">访问统计</h1>
        <p class="login-desc">请输入密码访问统计数据</p>
        
        <form id="login-form" onsubmit="return login(event)">
            <div class="input-group">
                <input type="password" id="password" placeholder="请输入密码" autofocus required>
            </div>
            <button type="submit" class="login-btn" id="login-btn">登 录</button>
        </form>
        
        <div class="error-msg" id="error-msg">密码错误，请重试</div>
        
        <a href="/" class="back-link">← 返回首页</a>
    </div>

    <script>
        async function login(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            
            btn.disabled = true;
            btn.textContent = '验证中...';
            errorMsg.classList.remove('show');
            
            try {
                const res = await fetch('/api/stats/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = '/stats';
                } else {
                    errorMsg.classList.add('show');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (e) {
                errorMsg.textContent = '网络错误，请重试';
                errorMsg.classList.add('show');
            }
            
            btn.disabled = false;
            btn.textContent = '登 录';
        }
    </script>
</body>
</html>
