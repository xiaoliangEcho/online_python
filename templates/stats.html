<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问统计 - Python 在线练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e4;
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }

        .logo span {
            color: #64B5F6;
        }

        .nav {
            display: flex;
            gap: 15px;
        }

        .nav a {
            color: #e4e4e4;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .nav a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .stat-value {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.7;
        }

        .stat-card.total .stat-value { color: #4CAF50; }
        .stat-card.today .stat-value { color: #2196F3; }
        .stat-card.ips .stat-value { color: #FF9800; }
        .stat-card.pages .stat-value { color: #9C27B0; }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 20px;
            min-height: 300px;
        }

        .chart-title {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 15px;
        }

        /* 柱状图 */
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-label {
            width: 80px;
            font-size: 13px;
            text-align: right;
            opacity: 0.8;
        }

        .bar-container {
            flex: 1;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .bar.green { background: linear-gradient(90deg, #4CAF50, #81C784); }
        .bar.blue { background: linear-gradient(90deg, #2196F3, #64B5F6); }
        .bar.orange { background: linear-gradient(90deg, #FF9800, #FFB74D); }
        .bar.purple { background: linear-gradient(90deg, #9C27B0, #BA68C8); }

        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .data-table th {
            background: rgba(0, 0, 0, 0.2);
            font-weight: bold;
        }

        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge.page { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .badge.api { background: rgba(33, 150, 243, 0.2); color: #2196F3; }

        /* 时间线 */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .time-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-label {
            width: 50px;
            font-size: 12px;
            opacity: 0.7;
        }

        .time-bar-wrapper {
            flex: 1;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .time-bar {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #81C784);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .time-value {
            width: 40px;
            font-size: 12px;
            text-align: right;
        }

        /* 刷新按钮 */
        .refresh-btn {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4CAF50;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(76, 175, 80, 0.3);
        }

        @media (max-width: 1000px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📊 访问<span>统计</span></div>
        <div class="nav">
            <a href="/">📝 算法练习</a>
            <a href="/free">🆓 自由编辑</a>
            <a href="/stats">📊 访问统计</a>
            <a href="#" onclick="logout()" style="background: rgba(244, 67, 54, 0.2); border-color: rgba(244, 67, 54, 0.3);">🚪 退出</a>
        </div>
    </div>

    <div class="container">
        <!-- 概览卡片 -->
        <div class="stats-grid">
            <div class="stat-card total">
                <div class="stat-value" id="total-visits">-</div>
                <div class="stat-label">总访问量</div>
            </div>
            <div class="stat-card today">
                <div class="stat-value" id="today-visits">-</div>
                <div class="stat-label">今日访问</div>
            </div>
            <div class="stat-card ips">
                <div class="stat-value" id="unique-ips">-</div>
                <div class="stat-label">独立访客</div>
            </div>
            <div class="stat-card pages">
                <div class="stat-value" id="page-count">-</div>
                <div class="stat-label">页面数量</div>
            </div>
        </div>

        <!-- 图表行 -->
        <div class="charts-row">
            <!-- 页面访问量 -->
            <div class="section">
                <div class="section-title">
                    📄 页面访问排行
                    <button class="refresh-btn" onclick="loadStats()" style="margin-left: auto;">🔄 刷新</button>
                </div>
                <div class="chart-container">
                    <div class="bar-chart" id="page-views-chart"></div>
                </div>
            </div>

            <!-- 今日访问时段分布 -->
            <div class="section">
                <div class="section-title">⏰ 今日访问时段分布</div>
                <div class="chart-container">
                    <div class="timeline" id="hourly-chart"></div>
                </div>
            </div>
        </div>

        <div class="charts-row">
            <!-- 访客来源 -->
            <div class="section">
                <div class="section-title">🌍 访客来源 TOP 10</div>
                <div class="chart-container">
                    <div class="bar-chart" id="ip-chart"></div>
                </div>
            </div>

            <!-- 平台分布 -->
            <div class="section">
                <div class="section-title">💻 访问平台分布</div>
                <div class="chart-container">
                    <div class="bar-chart" id="platform-chart"></div>
                </div>
            </div>
        </div>

        <!-- 最近访问记录 -->
        <div class="section">
            <div class="section-title">📜 最近访问记录</div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>IP</th>
                        <th>页面</th>
                        <th>平台</th>
                        <th>来源</th>
                    </tr>
                </thead>
                <tbody id="recent-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 加载统计数据
        async function loadStats() {
            try {
                // 概览数据
                const overviewRes = await fetch('/api/stats/overview');
                const overview = await overviewRes.json();
                
                if (overview.error) {
                    console.error('API错误:', overview.error);
                    return;
                }
                
                document.getElementById('total-visits').textContent = overview.total.toLocaleString();
                document.getElementById('today-visits').textContent = overview.today.toLocaleString();
                document.getElementById('unique-ips').textContent = overview.unique_ips.toLocaleString();
                document.getElementById('page-count').textContent = overview.page_views.length;

                // 页面访问排行
                renderBarChart('page-views-chart', overview.page_views, 'path', 'count', 'green');

                // 今日时段分布
                const hourlyRes = await fetch('/api/stats/hourly');
                const hourly = await hourlyRes.json();
                renderHourlyChart(hourly);

                // 访客来源
                const sourcesRes = await fetch('/api/stats/sources');
                const sources = await sourcesRes.json();
                renderBarChart('ip-chart', sources.ip_stats.slice(0, 10), 'ip', 'count', 'blue');
                renderBarChart('platform-chart', sources.platform_stats, 'platform', 'count', 'purple');

                // 最近访问
                const recentRes = await fetch('/api/stats/recent?limit=30');
                const recent = await recentRes.json();
                renderRecentTable(recent);
            } catch (e) {
                console.error('加载统计数据失败:', e);
            }
        }

        // 渲染柱状图
        function renderBarChart(containerId, data, labelKey, valueKey, color) {
            const container = document.getElementById(containerId);
            if (!data || data.length === 0) {
                container.innerHTML = '<div style="text-align: center; opacity: 0.5; padding: 20px;">暂无数据</div>';
                return;
            }

            const max = Math.max(...data.map(d => d[valueKey]));
            
            container.innerHTML = data.map(item => {
                const percent = (item[valueKey] / max * 100).toFixed(1);
                const label = item[labelKey].length > 15 
                    ? item[labelKey].substring(0, 15) + '...' 
                    : item[labelKey];
                return `
                    <div class="bar-item">
                        <div class="bar-label" title="${item[labelKey]}">${label}</div>
                        <div class="bar-container">
                            <div class="bar ${color}" style="width: ${percent}%">${item[valueKey]}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 渲染时段图
        function renderHourlyChart(data) {
            const container = document.getElementById('hourly-chart');
            const hourMap = {};
            data.forEach(d => hourMap[parseInt(d.hour)] = d.count);
            
            const max = Math.max(...Object.values(hourMap), 1);
            
            let html = '';
            for (let h = 0; h < 24; h++) {
                const count = hourMap[h] || 0;
                const percent = (count / max * 100).toFixed(1);
                html += `
                    <div class="time-bar-container">
                        <div class="time-label">${h.toString().padStart(2, '0')}:00</div>
                        <div class="time-bar-wrapper">
                            <div class="time-bar" style="width: ${percent}%"></div>
                        </div>
                        <div class="time-value">${count}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // 渲染最近访问表格
        function renderRecentTable(data) {
            const tbody = document.getElementById('recent-table');
            tbody.innerHTML = data.map(item => {
                const time = new Date(item.timestamp).toLocaleString('zh-CN');
                const path = item.path;
                const platform = getPlatform(item.user_agent);
                const referer = item.referer || '直接访问';
                const refererShort = referer.length > 30 ? referer.substring(0, 30) + '...' : referer;
                
                return `
                    <tr>
                        <td>${time}</td>
                        <td>${item.ip}</td>
                        <td><span class="badge page">${path}</span></td>
                        <td>${platform}</td>
                        <td title="${referer}">${refererShort}</td>
                    </tr>
                `;
            }).join('');
        }

        // 解析平台
        function getPlatform(ua) {
            if (!ua) return '未知';
            if (ua.includes('Mobile')) return '📱 移动端';
            if (ua.includes('Windows')) return '🖥️ Windows';
            if (ua.includes('Mac')) return '🍎 Mac';
            if (ua.includes('Linux')) return '🐧 Linux';
            return '❓ 其他';
        }

        // 自动刷新
        loadStats();
        setInterval(loadStats, 60000); // 每分钟刷新

        // 退出登录
        async function logout() {
            if (confirm('确定要退出登录吗？')) {
                await fetch('/api/stats/logout');
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
